<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback</title>
  <link rel="stylesheet" href="feedback.css?v=soft-shadow">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f4f4f5; color: #18181b;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body.is-embedded { background: transparent; }
    body.is-embedded .fb-scrim { background: transparent; }
    body.is-embedded .caption { display: none; }
    .caption { position: fixed; left: 50%; top: calc(50% + 64px); transform: translateX(-50%);
      color: #a1a1aa; font-size: 13px; white-space: nowrap; pointer-events: none; }
  </style>
</head>
<body>
  <p class="caption">Press the button to see it morph.</p>
  <script>
    if (window.self !== window.top) document.body.classList.add("is-embedded");
  </script>
  <script src="feedback.js"></script>
</body>
</html>
