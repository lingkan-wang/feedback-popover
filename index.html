<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback</title>
  <link rel="stylesheet" href="feedback.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f4f4f5; color: #18181b;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .caption { position: fixed; left: 50%; top: calc(50% + 64px); transform: translateX(-50%);
      color: #a1a1aa; font-size: 13px; white-space: nowrap; pointer-events: none; }
  </style>
</head>
<body>
  <p class="caption">Press the button to see it morph.</p>
  <script src="feedback.js"></script>
</body>
</html>
